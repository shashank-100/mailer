name: Send Email Campaign

on:
  workflow_dispatch:
    inputs:
      campaign_id:
        description: "Campaign ID from Supabase"
        required: true
      daily_limit:
        description: "Emails per sender per run (default 50)"
        required: false
        default: "50"
      delay_ms:
        description: "Delay between emails in ms (default 3000)"
        required: false
        default: "3000"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send campaign
        env:
          CAMPAIGN_ID: ${{ inputs.campaign_id }}
          DAILY_LIMIT: ${{ inputs.daily_limit }}
          DELAY_MS: ${{ inputs.delay_ms }}
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Sender 1
          SENDER_1_NAME: ${{ secrets.SENDER_1_NAME }}
          SENDER_1_EMAIL: ${{ secrets.SENDER_1_EMAIL }}
          SENDER_1_HOST: ${{ secrets.SENDER_1_HOST }}
          SENDER_1_PORT: ${{ secrets.SENDER_1_PORT }}
          SENDER_1_USER: ${{ secrets.SENDER_1_USER }}
          SENDER_1_PASS: ${{ secrets.SENDER_1_PASS }}
          # Sender 2
          SENDER_2_NAME: ${{ secrets.SENDER_2_NAME }}
          SENDER_2_EMAIL: ${{ secrets.SENDER_2_EMAIL }}
          SENDER_2_HOST: ${{ secrets.SENDER_2_HOST }}
          SENDER_2_PORT: ${{ secrets.SENDER_2_PORT }}
          SENDER_2_USER: ${{ secrets.SENDER_2_USER }}
          SENDER_2_PASS: ${{ secrets.SENDER_2_PASS }}
          # Sender 3
          SENDER_3_NAME: ${{ secrets.SENDER_3_NAME }}
          SENDER_3_EMAIL: ${{ secrets.SENDER_3_EMAIL }}
          SENDER_3_HOST: ${{ secrets.SENDER_3_HOST }}
          SENDER_3_PORT: ${{ secrets.SENDER_3_PORT }}
          SENDER_3_USER: ${{ secrets.SENDER_3_USER }}
          SENDER_3_PASS: ${{ secrets.SENDER_3_PASS }}
          # Sender 4
          SENDER_4_NAME: ${{ secrets.SENDER_4_NAME }}
          SENDER_4_EMAIL: ${{ secrets.SENDER_4_EMAIL }}
          SENDER_4_HOST: ${{ secrets.SENDER_4_HOST }}
          SENDER_4_PORT: ${{ secrets.SENDER_4_PORT }}
          SENDER_4_USER: ${{ secrets.SENDER_4_USER }}
          SENDER_4_PASS: ${{ secrets.SENDER_4_PASS }}
        run: npx tsx scripts/run-campaign-from-db.ts
